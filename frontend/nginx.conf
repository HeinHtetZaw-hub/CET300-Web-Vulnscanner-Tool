server {
    listen 80;
    root  /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip            on;
    gzip_types      text/plain text/css application/json
                    application/javascript text/javascript
                    application/xml text/xml image/svg+xml;
    gzip_min_length 1024;
    gzip_vary       on;

    # ── API proxy to backend ──────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Allow long-running scan requests (crawl + detection can take minutes)
        proxy_connect_timeout 10s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;

        # Pass large PDF / JSON report bodies
        proxy_buffering    off;
        client_max_body_size 10m;
    }

    # ── Vite-built JS/CSS assets — content-addressed filenames, long cache ────
    location /assets/ {
        expires            1y;
        add_header         Cache-Control "public, immutable";
        access_log         off;
    }

    # ── React SPA — no cache on index.html, fallback for client-side routing ──
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
